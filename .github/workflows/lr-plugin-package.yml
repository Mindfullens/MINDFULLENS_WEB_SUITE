name: Package Lightroom plugin (client ZIP)

run-name: "${{ github.workflow }} @ ${{ github.ref_name }}"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Build client ZIP
        run: node scripts/package-lr-plugin-zip.mjs

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v6
        with:
          name: analog-signature-lightroom-plugin
          path: dist/Analog-Signature-Lightroom-*.zip
          if-no-files-found: error
