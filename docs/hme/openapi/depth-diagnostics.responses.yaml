paths:
  /api/depth/validate:
    post:
      responses:
        "200":
          description: Non-strict response (warnings allowed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  warnings:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [DEPTH_DIAGNOSTICS_WARNING]
                        reason:
                          type: string
                          nullable: true
                        code:
                          type: string
                          nullable: true
        "422":
          description: Strict validation failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum: [DEPTH_DIAGNOSTICS_INCOMPATIBLE]
                  reason:
                    type: string
                    nullable: true
                  code:
                    type: string
                    nullable: true
